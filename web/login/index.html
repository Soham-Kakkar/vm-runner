<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - VM Runner</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="shell" style="flex-direction: column; align-items: center; justify-content: center;">
  <div class="auth-container">
    <div class="brand" style="justify-content: center; margin-bottom: 32px;">
      <div class="brand-mark">VM</div>
      <h1 style="font-size: 24px;">VM Runner</h1>
    </div>
    <div class="auth-box">
      <h2 style="margin-bottom: 16px;">Sign in</h2>
      <form id="login-form" class="stack">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="primary" style="width: 100%; justify-content: center; padding: 10px;">Sign in</button>
      </form>
      <p id="msg" style="margin-top: 16px; text-align: center; font-size: 13px;"></p>
    </div>
    <div class="auth-footer">
      New here? <a href="/register/">Create an account &rarr;</a>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const payload = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      };
      const resp = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (resp.ok) {
        const data = await resp.json();
        localStorage.setItem('vmrunner_user', JSON.stringify(data.user));
        localStorage.setItem('vmrunner_token', data.token);
        window.location.href = '/';
      } else {
        const err = await resp.text();
        document.getElementById('msg').className = 'danger';
        document.getElementById('msg').textContent = 'Error: ' + err;
      }
    });
  </script>
</body>
</html>
