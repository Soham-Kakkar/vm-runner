<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register - VM Runner</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="shell" style="flex-direction: column; align-items: center; justify-content: center;">
  <div class="auth-container">
    <div class="brand" style="justify-content: center; margin-bottom: 32px;">
      <div class="brand-mark">VM</div>
      <h1 style="font-size: 24px;">VM Runner</h1>
    </div>
    <div class="auth-box">
      <h2 style="margin-bottom: 16px;">Create your account</h2>
      <form id="register-form" class="stack">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label>ID</label>
          <input type="text" id="external-id" required placeholder="2024UEE0123">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <div class="form-group">
           <label>Access Role</label>
           <select id="role">
              <option value="user">Solver (User)</option>
              <option value="admin">Maker (Admin)</option>
           </select>
        </div>
        <button type="submit" class="primary" style="width: 100%; justify-content: center; padding: 10px;">Sign up</button>
      </form>
      <p id="msg" style="margin-top: 16px; text-align: center; font-size: 13px;"></p>
    </div>
    <div class="auth-footer">
      Already have an account? <a href="/login/">Sign in &rarr;</a>
    </div>
  </div>
  <script>
    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      const payload = {
        username: document.getElementById('username').value,
        name: document.getElementById('name').value,
        id: document.getElementById('external-id').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };
      const resp = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (resp.ok) {
        document.getElementById('msg').className = 'muted';
        document.getElementById('msg').textContent = 'Account created. Redirecting to login...';
        setTimeout(() => window.location.href = '/login/', 1500);
      } else {
        const err = await resp.text();
        document.getElementById('msg').className = 'danger';
        document.getElementById('msg').textContent = 'Error: ' + err;
      }
    });
  </script>
</body>
</html>
