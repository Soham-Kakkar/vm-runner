<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CTF Maker - VM Runner</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .maker-form { display: flex; flex-direction: column; gap: 24px; max-width: 800px; }
    .section-title { border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 16px; font-size: 18px; }
    .challenge-editor { background: var(--panel-color); border: 1px solid var(--border-color); border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-mark">VM</div>
          <h1 style="font-size: 18px;">VM Runner</h1>
        </div>
      </div>
      <nav class="nav">
        <a href="/" class="nav-item">
          <span>🏠</span> Dashboard
        </a>
        <a href="/maker/" class="nav-item active">
          <span>🛠️</span> CTF Maker
        </a>
      </nav>
    </aside>

    <main class="workspace">
      <div class="container">
        <header class="page-header">
          <div>
            <h2 style="font-size: 24px;">CTF Maker</h2>
            <p class="muted">Design your challenge experience.</p>
          </div>
          <button id="save-ctf-btn" class="primary">Save CTF</button>
        </header>

        <form id="maker-form" class="maker-form">
          <div class="card">
            <h3 class="section-title">General Information</h3>
            <div class="stack">
              <div class="form-row">
                <div class="form-group">
                  <label>CTF ID (Unique)</label>
                  <input type="text" id="ctf-id" required placeholder="sql-injection">
                </div>
                <div class="form-group">
                  <label>Title</label>
                  <input type="text" id="ctf-title" required placeholder="SQL Injection Lab">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Visibility</label>
                  <select id="ctf-visibility">
                    <option value="public">Public</option>
                    <option value="private">Private</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Status</label>
                  <select id="ctf-status">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div class="card">
            <h3 class="section-title">Default VM Configuration</h3>
            <div class="stack">
              <div class="form-group">
                <label>ISO Image Path (on server)</label>
                <input type="text" id="vm-image" placeholder="/data/iso/alpine.iso">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Memory (MB)</label>
                  <input type="text" id="vm-memory" value="1024">
                </div>
                <div class="form-group">
                  <label>Display Type</label>
                  <select id="vm-display">
                    <option value="terminal">Terminal (Serial)</option>
                    <option value="vnc">VNC (Graphical)</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div id="challenges-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
              <h3 style="font-size: 18px;">Challenges</h3>
              <button type="button" id="add-challenge-btn">+ Add Challenge</button>
            </div>
            <div id="challenges-list" class="stack">
              <!-- Challenges will be added here -->
            </div>
          </div>
        </form>
      </div>
    </main>
  </div>

  <template id="challenge-template">
    <div class="challenge-editor">
      <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
        <h4 class="challenge-num">Challenge #1</h4>
        <button type="button" class="danger remove-btn" style="padding: 2px 8px; font-size: 12px;">Remove</button>
      </div>
      <div class="stack">
        <div class="form-row">
          <div class="form-group">
            <label>ID</label>
            <input type="text" class="ch-id" required placeholder="chal-1">
          </div>
          <div class="form-group">
            <label>Title</label>
            <input type="text" class="ch-title" required placeholder="Basics">
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea class="ch-desc" rows="2"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Validator</label>
            <select class="ch-validator">
              <option value="static">Static Flag</option>
              <option value="hmac">HMAC (Dynamic)</option>
            </select>
          </div>
          <div class="form-group validator-field static-only">
            <label>Flag</label>
            <input type="text" class="ch-flag" placeholder="flag{...}">
          </div>
          <div class="form-group validator-field hmac-only hidden">
            <label>Template</label>
            <input type="text" class="ch-template" value="flag{<hmac>}">
          </div>
        </div>
        <div class="form-row">
           <div class="form-group">
              <label>Question No (for HMAC)</label>
              <input type="text" class="ch-qno" value="1">
           </div>
        </div>
      </div>
    </div>
  </template>

  <script src="maker.js"></script>
  <script>
    const userStr = localStorage.getItem('vmrunner_user');
    if (!userStr) {
      window.location.href = '/login/';
    } else {
      const user = JSON.parse(userStr);
      if (user.role !== 'admin') {
        alert('Access denied: Admins only.');
        window.location.href = '/';
      }
    }
  </script>
</body>
</html>
