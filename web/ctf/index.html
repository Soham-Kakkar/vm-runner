<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CTF Play - VM Runner</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.15.0/css/xterm.css" />
  <style>
    /* Custom overrides for the play experience */
    .workspace { padding: 24px; }
    .page-header { margin-bottom: 16px; }
    .xterm .xterm-viewport { background-color: #000 !important; }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-mark">VM</div>
          <h1 id="ctf-title" style="font-size: 18px;">CTF</h1>
        </div>
        <p id="ctf-meta" class="muted" style="font-size: 12px; margin-top: 4px;"></p>
      </div>
      <nav class="nav">
        <a href="/" class="nav-item">
          <span>🏠</span> Dashboard
        </a>
        <div class="nav-header" style="padding: 16px 16px 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted);">Challenges</div>
        <div id="challenge-list" class="stack" style="padding: 0 16px;">
          <!-- Challenges will be listed here -->
        </div>
        <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border-color);">
          <a href="/" class="nav-item">
            <span>←</span> Back to Home
          </a>
        </div>
      </nav>
    </aside>

    <main class="workspace">
      <section id="session-view" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
        <header class="page-header">
          <div style="display: flex; align-items: center; gap: 12px;">
            <h2 id="session-title" style="font-size: 20px;">No session</h2>
            <span id="validator-pill" class="pill">static</span>
            <span id="runtime-pill" class="pill">terminal</span>
          </div>
          <button id="end-session-btn" class="danger">Stop Session</button>
        </header>

        <div class="session-grid">
          <div class="stack" style="gap: 16px;">
            <div class="card">
              <h3>Submit Flag</h3>
              <form id="submit-form" class="submit-form">
                <input id="answer-input" type="text" autocomplete="off" placeholder="flag{...}">
                <button type="submit" class="primary">Submit</button>
              </form>
              <p id="answer-feedback" class="feedback"></p>
            </div>
            <div class="card" style="flex-grow: 1;">
              <h3>Challenge Info</h3>
              <p id="challenge-desc">Select a challenge from the sidebar to begin.</p>
            </div>
          </div>

          <div class="runtime-panel">
            <div id="terminal-panel" style="height: 100%;">
              <div id="terminal"></div>
            </div>
            <div id="vnc-container" class="hidden" style="height: 100%;">
              <div id="vnc-screen"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="no-session-msg" class="auth-page" style="height: calc(100vh - 64px);">
        <div style="text-align: center;">
          <h2 style="font-size: 24px; margin-bottom: 8px;">Select a Challenge</h2>
          <p class="muted">Pick a challenge from the sidebar to start your VM session.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@4.15.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.js"></script>
  <script type="module">
    import RFB from 'https://cdn.jsdelivr.net/npm/@novnc/novnc@1.3.0/core/rfb.js';
    window.RFB = RFB;
  </script>
  <script src="ctf.js"></script>
  <script>
    if (!localStorage.getItem('vmrunner_user')) {
      window.location.href = '/login/';
    }
  </script>
</body>
</html>
